name: codebase
description: "A Flutter codebase applying AI powered code generation and refactoring techniques to enhance development efficiency and code quality."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

workspace:
  - packages/*

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: any
  bloc: any
  get_it: any
  dio: any
  retrofit: any
  go_router: any
  json_annotation: any
  freezed_annotation: any
  intl: any
  permission_base: any
  analytic_base: any
  crash_report_base: any
  theme_base: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_flavorizr: ^2.5.0
  build_runner: any
  retrofit_generator: any
  json_serializable: any
  freezed: any
  intl_utils: any
  melos: ^7.3.0

melos:
  scripts:
    generate:
      run: melos exec --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run code generation for relevant packages.
    test:
      run: melos exec --dir-exists="test" -- "flutter test"
      description: Run tests in packages that have a test folder.
    analyze:
      run: melos exec -- "flutter analyze"
      description: Run static analysis across all packages.

flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  template_arb_file: app_en.arb
  output_dir: lib/generated
