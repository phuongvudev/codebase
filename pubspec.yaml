name: codebase
description: "A Flutter codebase applying AI powered code generation and refactoring techniques to enhance development efficiency and code quality."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  get_it: ^9.2.1
  dio: ^5.9.2
  retrofit: ^4.9.2
  go_router: ^17.3.0
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  permission_base:
    path: packages/permission_base

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_flavorizr: ^2.5.0
  build_runner: any
  retrofit_generator: any
  json_serializable: any
  freezed: any
  intl_utils: any

flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  template_arb_file: app_en.arb
  output_dir: lib/generated
